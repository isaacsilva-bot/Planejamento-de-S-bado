<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Roteiro do Planejamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #ff6a00;
      color: white;
      padding: 18px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .btn-rota {
      display:block;
      background:#ff6a00;
      color:white;
      padding:14px;
      border-radius:10px;
      text-align:center;
      margin-bottom:15px;
      font-weight:bold;
      text-decoration:none;
    }

    .linha {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      font-size: 14px;
    }

    .col1 {
      width: 35%;
      font-weight: bold;
      color: #333;
    }

    .col2 {
      width: 65%;
      text-align: right;
    }

    .endereco {
      margin-bottom: 6px;
      color: #555;
    }

    .btn-maps {
      background: #ff6a00;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 12px;
    }

    .vazio {
      text-align: center;
      color: #777;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>🚚 Roteiro de Entregas</header>

<div class="container">
  <input type="text" id="idMotorista" placeholder="Digite seu ID...">
  <div id="resultado"></div>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?output=csv&gid=465492226";

let dados = [];

// leitura simples do CSV
function parseCSV(texto) {
  const linhas = texto.split("\n");
  const headers = linhas[0].split(",");

  return linhas.slice(1).map(linha => {
    const colunas = linha.split(",");
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = colunas[i]);
    return obj;
  });
}

async function carregarDados() {
  const res = await fetch(url);
  const texto = await res.text();
  dados = parseCSV(texto);
}

function montarRota(lista) {
  const enderecos = lista.map(r =>
    `${r["ENDEREÇO"]} ${r["NUMERO"]}, ${r["BAIRRO"]}, ${r["CEP"]}`
  );

  const origem = encodeURIComponent(enderecos[0]);
  const destino = encodeURIComponent(enderecos[enderecos.length - 1]);

  const waypoints = enderecos.slice(1, -1)
    .map(e => encodeURIComponent(e))
    .join("|");

  return `https://www.google.com/maps/dir/?api=1&origin=${origem}&destination=${destino}&waypoints=${waypoints}`;
}

function buscar() {
  const id = document.getElementById("idMotorista").value.trim();
  const div = document.getElementById("resultado");

  if (!id) {
    div.innerHTML = "<p class='vazio'>Digite seu ID</p>";
    return;
  }

  const filtrado = dados.filter(d => d["ID do motorista"] === id);

  if (filtrado.length === 0) {
    div.innerHTML = "<p class='vazio'>Nenhum resultado</p>";
    return;
  }

  let html = "";

  // botão rota completa
  const rota = montarRota(filtrado);
  html += `<a href="${rota}" target="_blank" class="btn-rota">🚀 Iniciar rota completa</a>`;

  // lista clean
  filtrado.forEach(r => {
    const endereco = `${r["ENDEREÇO"]} ${r["NUMERO"]}, ${r["BAIRRO"]}`;
    const maps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;

    html += `
      <div class="linha">
        <div class="col1">
          ${r["Nome da Loja"]}
        </div>

        <div class="col2">
          <div class="endereco">${endereco}</div>
          <a class="btn-maps" href="${maps}" target="_blank">📍 Mapa</a>
        </div>
      </div>
    `;
  });

  div.innerHTML = html;
}

document.getElementById("idMotorista").addEventListener("input", buscar);

carregarDados();
</script>

</body>
</html>
