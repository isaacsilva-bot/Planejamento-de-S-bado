<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planejamento de Coletas de Sábado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
  }

  header {
    background: #ff6a00;
    padding: 20px 10px;
    text-align: center;
  }

  .logo {
    width: 260px;
    max-width: 95%;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }

  .container {
    padding: 10px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
    font-size: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    background: white;
  }

  th {
    background: #eee;
    text-align: left;
    padding: 8px;
  }

  td {
    padding: 8px;
    border-bottom: 1px solid #eee;
  }

  tr:hover {
    background: #f9f9f9;
  }

  .btn-maps {
    background: #ff6a00;
    color: white;
    padding: 5px 8px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 11px;
  }

  .vazio {
    text-align: center;
    margin-top: 20px;
    color: #666;
  }
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
</header>

<div class="container">
  <input type="text" id="idMotorista" placeholder="Digite seu ID...">
  <div id="resultado"></div>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?output=csv&gid=465492226";

let dados = [];

function parseCSV(texto) {
  const linhas = texto.split("\n");
  const headers = linhas[0].split(",");

  return linhas.slice(1).map(linha => {
    const colunas = linha.split(",");
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = colunas[i]);
    return obj;
  });
}

async function carregarDados() {
  const res = await fetch(url);
  const texto = await res.text();
  dados = parseCSV(texto);
}

function buscar() {
  const id = document.getElementById("idMotorista").value.trim();
  const div = document.getElementById("resultado");

  if (!id) {
    div.innerHTML = "<p class='vazio'>Digite seu ID</p>";
    return;
  }

  const filtrado = dados.filter(d => d["ID do motorista"] === id);

  if (filtrado.length === 0) {
    div.innerHTML = "<p class='vazio'>Você não possui rota neste sábado ou digitou o ID errado. Por favor, verifique novamente. Caso tenha disponibilidade para trabalhar, informe ao seu analista. </p>";
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>Loja</th>
          <th>Endereço</th>
          <th>Nº</th>
          <th>Bairro</th>
          <th>CEP</th>
          <th>Complemento</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
  `;

  filtrado.forEach(r => {
    const enderecoCompleto = `${r["ENDEREÇO"]}, ${r["NUMERO"]} - ${r["BAIRRO"]}`;
    const maps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(enderecoCompleto)}`;

    html += `
      <tr>
        <td>${r["Nome da Loja"] || ""}</td>
        <td>${r["ENDEREÇO"] || ""}</td>
        <td>${r["NUMERO"] || ""}</td>
        <td>${r["BAIRRO"] || ""}</td>
        <td>${r["CEP"] || ""}</td>
        <td>${r["COMPLEMENTO"] || ""}</td>
        <td>
          <a class="btn-maps" href="${maps}" target="_blank">📍</a>
        </td>
      </tr>
    `;
  });

  html += `</tbody></table>`;

  div.innerHTML = html;
}

document.getElementById("idMotorista").addEventListener("input", buscar);

carregarDados();
</script>

</body>
</html>
